name: Release Executable

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Generate ICO
        run: node make_ico.js

      - name: Pre-fetch pkg base binary
        run: npx pkg-fetch -t node18-win-x64

      - name: Patch cached base binary
        run: node patch_cache.js

      - name: Compile Executable
        run: npx pkg . --targets node18-win-x64 --output local-bridge.exe

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: local-bridge.exe
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
