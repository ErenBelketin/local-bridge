name: Release Executable

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Generate ICO
        run: node make_ico.js

      - name: Download rcedit
        run: curl -L -o rcedit.exe https://github.com/electron/rcedit/releases/download/v2.0.0/rcedit-x64.exe

      - name: Compile Executable First Pass (to download base binary)
        run: npx pkg . --targets node18-win-x64 --output local-bridge.exe

      - name: Patch cached base binary
        shell: pwsh
        run: |
          $cacheDir = "$env:USERPROFILE\.pkg-cache"
          $binaries = Get-ChildItem -Path $cacheDir -Filter fetched-* -Recurse -ErrorAction SilentlyContinue
          if ($binaries.Count -eq 0) {
            Write-Host "No binaries found in cache."
            exit 1
          }
          foreach ($bin in $binaries) {
            $builtPath = Join-Path $bin.DirectoryName $bin.Name.Replace("fetched-", "built-")
            if (-not (Test-Path $builtPath)) {
              Copy-Item $bin.FullName $builtPath -Force
              Write-Host "Patching $builtPath with icon..."
              .\rcedit.exe $builtPath --set-icon app_icon.ico
            }
          }

      - name: Compile Executable Second Pass (with icon)
        run: npx pkg . --targets node18-win-x64 --output local-bridge.exe

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: local-bridge.exe
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
