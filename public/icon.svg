<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0f" />
      <stop offset="100%" stop-color="#12121e" />
    </linearGradient>
    
    <!-- Glow and Theme Gradient -->
    <linearGradient id="themeGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2563eb" />
      <stop offset="50%" stop-color="#06b6d4" />
      <stop offset="100%" stop-color="#60a5fa" />
    </linearGradient>

    <!-- Drop Shadow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="16" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background Card -->
  <rect width="512" height="512" rx="112" fill="url(#bgGrad)" stroke="rgba(255, 255, 255, 0.05)" stroke-width="8"/>

  <!-- Glowing Abstract Bridge Nodes -->
  <g filter="url(#glow)">
    <!-- Central Connection Lines -->
    <path d="M 140 256 Q 256 160 372 256 Q 256 352 140 256 Z" fill="none" stroke="url(#themeGrad)" stroke-width="24" stroke-linecap="round" stroke-linejoin="round"/>
    
    <!-- Left Node -->
    <circle cx="140" cy="256" r="32" fill="#0a0a0f" stroke="url(#themeGrad)" stroke-width="16" />
    <circle cx="140" cy="256" r="10" fill="#60a5fa" />

    <!-- Right Node -->
    <circle cx="372" cy="256" r="32" fill="#0a0a0f" stroke="url(#themeGrad)" stroke-width="16" />
    <circle cx="372" cy="256" r="10" fill="#60a5fa" />
    
    <!-- Bridge Center Pulse -->
    <circle cx="256" cy="256" r="14" fill="#06b6d4" />
  </g>
</svg>
